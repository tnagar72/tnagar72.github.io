<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!--
    iOS home-screen touch icon: same ※ glyph but with white background
    + slight inset so iOS's rounded-corner crop doesn't clip the mark.
    Rendered at 180x180 (the standard apple-touch-icon size).
  -->
  <rect width="180" height="180" fill="#ffffff"/>
  <text x="90" y="138" font-size="140" text-anchor="middle" fill="#1f1f1f" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">※</text>
</svg>
