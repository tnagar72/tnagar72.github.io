<svg xmlns="http://www.w3.org/2000/svg" viewBox="2 6 60 56">
  <!--
    Favicon: ※ (reference mark, U+203B, kome-jirushi).
    Editorial / academic-register glyph used in Japanese typography as a
    note marker and in Western scholarly footnotes alongside *, †, ‡, §, ¶.

    Internal font-size 64 with a tight viewBox (2 6 60 56) so the glyph
    visually fills more of the rendered favicon area in browser tabs.
    Dark-mode inversion via prefers-color-scheme media query so the glyph
    stays legible in dark-themed tabs (supported in Safari + Firefox;
    Chrome falls back to the default fill).
  -->
  <style>
    text { fill: #1f1f1f; }
    @media (prefers-color-scheme: dark) {
      text { fill: #fafafa; }
    }
  </style>
  <text x="32" y="52.48" font-size="64" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">※</text>
</svg>
