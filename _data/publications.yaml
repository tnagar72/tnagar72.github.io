  summary: "We audit 70 English–Spanish YA novels, turning 619 extracted characters into contextual embeddings and projecting them onto 25 theory-grounded sociocultural axes (warmth, literacy, status, and more). We ask two questions: who gets associated with each language (<em>casting</em>), and what that language does to a character's portrayal (<em>framing</em>)? We find that Spanish-associated characters occupy a contradictory semantic space, and code-mixed text behaves as its own distinct register — not a midpoint between its two languages."
