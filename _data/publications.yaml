      icon: "fa-code"
    - label: "ND Symposium Poster"
      url: "/Bridging_Language_Gaps_CS/Tanay ND Summer Symposium.pdf"
      icon: "phosphor-presentation-chart"
  summary: "We fine-tune a multilingual language model on synthetic code-switched text at controlled mixing ratios and study how those ratios affect performance on both low- and high-resource languages. We find that the ratio matters: a medium ratio optimally closes ~80% of the Hindi–English reasoning gap on CommonsenseQA without degrading English performance."
  # ────────── Research-page fields ──────────
  tldr: "Fine-tuning with synthetic code-switched data closes 80% of the Hindi–English reasoning performance gap on CommonsenseQA — without any English degradation."
  accent: blue
  subjects: [NLP, Multilingual, Language Equity]
  keywords: [code-switching, low-resource-languages, hindi, code-mixing-index, fine-tuning, CommonsenseQA, LLaMA-3]
