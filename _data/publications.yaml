- id: bridging-language-gaps
  # Slug stays "bridging-language-gaps" because it's the stable URL handle.
  # Display title matches the canonical published title on arXiv + BibTeX so
  # the page is searchable under the name other researchers will use.
  title: "Breaking Language Barriers: Equitable Performance in Multilingual Language Models"
  authors:
    - { name: "Tanay Nagar", role: "author", marks: "1, 3, †" }
    - { name: "Grigorii Khvatskii", role: "author", marks: "2, 4" }
    - { name: "Anna Sokol", role: "author", marks: "2, 4" }
    - { name: "Nitesh V. Chawla", role: "author", marks: "2, 4" }
  venue_html: 'Poster: NAACL 2025 Student Research Workshop (SRW); ND Summer Research Symposium 2024 · Full paper on <a href="https://arxiv.org/abs/2508.12662" target="_blank" rel="noopener noreferrer">arXiv</a> 2025.'
  venue-shorthand: NAACL
  year: 2025
  type: conference
  featured: true
  feature-order: 2
  selected: true
  awards:
    - text: "Bromley Conference Travel Award"
    - text: "CDIS Student Travel Award"
  links:
    - label: "NAACL SRW Poster"
      url: "/Bridging_Language_Gaps_CS/NAACL 2025 Presentation.pdf"
      icon: "phosphor-presentation-chart"
    - label: "Visualization"
      url: "/Bridging_Language_Gaps_CS/breaking_language_barriers_interactive_vis.html"
      icon: "fa-chart-line"
    - label: "arXiv"
      url: "https://arxiv.org/abs/2508.12662"
      icon: "fa-file-alt"
    - label: "Code + Data"
      url: "https://github.com/tnagar72/Breaking-Language-Barriers-Equitable-Performance-in-Multilingual-Language-Models"
      icon: "fa-code"
    - label: "ND Symposium Poster"
      url: "/Bridging_Language_Gaps_CS/Tanay ND Summer Symposium.pdf"
      icon: "phosphor-presentation-chart"
  summary: "We fine-tune a multilingual language model on synthetic code-switched text at controlled mixing ratios and study how those ratios affect performance on both low- and high-resource languages. We find that the ratio matters: a medium ratio optimally closes ~80% of the Hindi–English reasoning gap on CommonsenseQA without degrading English performance."
  # ────────── Research-page fields ──────────
  tldr: "Fine-tuning with synthetic code-switched data closes 80% of the Hindi–English reasoning performance gap on CommonsenseQA — without any English degradation."
  accent: blue
  subjects: [NLP, Multilingual, Language Equity]
  keywords:
    [
      code-switching,
      low-resource-languages,
      hindi,
      code-mixing-index,
      fine-tuning,
      CommonsenseQA,
      LLaMA-3,
    ]
