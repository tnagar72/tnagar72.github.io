- id: honors-thesis
  title: "Decoding Bias in Letters of Recommendation: A Word Embeddings Approach"
  authors:
    - { name: "Tanay Nagar", role: "author", marks: "1" }
    - { name: "Dr. Fred Sala", role: "advisor", marks: "4, ‡" }
    - { name: "Dr. Sarah Jung", role: "advisor", marks: "2, ‡" }
    - { name: "Dr. Shamya Karumbaiah", role: "advisor", marks: "3, ‡" }
  venue: "Senior Honors Thesis, University of Wisconsin-Madison, 2025 · Oral presentation: UW Honors Research Symposium 2025."
  venue-shorthand: "UW Honors"
  year: 2025
  type: thesis
  featured: true
  feature-order: 3
  selected: true
  awards:
    - text: "Hilldale Undergraduate/Faculty Research Fellowship"
      url: "https://awards.advising.wisc.edu/campus-wide-award-recipients/test-hilldale-fellows/#:~:text=Tanay%20Nagar%2C%20Computer%20Sciences%2C%20Philosophy%2C%20Sarah%20Jung"
    - text: "Richard Ralph Phoenix Rising Humanitarian Scholarship"
      url: "https://ls.wisc.edu/news/tanay-nagar-awarded-richard-ralph-winter-phoenix-rising-humanitarian-scholarship"
  links:
    - label: "Honors Symposium Talk"
      url: "/Senior_Honors_Thesis/NAGAR_SYMPOSIUM2025.pptx (2).pdf"
      icon: "phosphor-lectern"
    - label: "Fellowship Proposal"
      url: "/Senior_Honors_Thesis/Nagar Senior Honors Thesis Grant Proposal.pdf"
      icon: "fa-file-alt"
  summary: "Using 1,585 de-identified letters of recommendation (~919k tokens), my thesis combines Word2Vec and fine-tuned Mistral-7B embeddings to measure gender-directional framing via bias axes, WEAT-style tests, and analogy probes. It turns long-standing concerns about biased LoR language into quantitative metrics that can be used for reviewer calibration, dashboards, and faculty workshops to support fairer admissions and evaluations."
  # ────────── Research-page fields ──────────
  tldr: "We use word embeddings (word2Vec + transformer-based) on an 11-year corpus of UW Plastic Surgery residency letters of recommendation to quantify, interpret, and visualize implicit gender and ethnic biases/trends."
  accent: grey
  subjects: [Fairness, NLP, Bias]
  keywords:
    [
      word-embeddings,
      word2Vec,
      letter-of-recommendation,
      SC-WEAT,
      t-SNE,
      senior-thesis,
    ]
  venue_name: "Senior Honors Thesis"
  venue_meta:
    - "Oral Presentation at UW Honors Symposium"
  affiliations:
    - {
        mark: "1",
        name: "University of Wisconsin–Madison",
        url: "https://www.wisc.edu/",
      }
    - {
        mark: "2",
        name: "Department of Surgery, UW SMPH",
        url: "https://www.surgery.wisc.edu/",
      }
    - {
        mark: "3",
        name: "Department of Educational Psychology, UW-Madison",
        url: "https://edpsych.education.wisc.edu/",
      }
    - {
        mark: "4",
        name: "Department of Computer Sciences, UW-Madison",
        url: "https://www.cs.wisc.edu/",
      }
  legend:
    - { glyph: "‡", text: "Thesis advisor" }
  acknowledgements: "This research was supported by the Hilldale Undergraduate/Faculty Research Fellowship and the Richard Ralph Phoenix Rising Humanitarian Scholarship."

