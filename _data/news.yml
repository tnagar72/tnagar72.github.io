# news.yml — homepage Updates feed
#
# Each entry has:
#   date: YYYY-MM-DD (ISO; rendered as "Mon YYYY" — e.g. "May 2026")
#   body: free Markdown — [text](url) for links, *italic*, **bold**, emoji
#
# The include sorts newest-first by `date`, so file order doesn't matter.
# Add a new entry at the top, bottom, or anywhere — it'll land in the
# right spot when the site builds.
#
# When this file is empty (no entries), the homepage Updates section
# disappears entirely (the include is guarded). The /updates/ page
# still renders, just with a "Nothing yet." line.
#
# Voice convention: first-person, light personality. Career milestones
# can stay neutral; writing + personal entries can have voice.

# (empty — homepage will not render the Updates section)
