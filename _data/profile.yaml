# Consolidated bio HTML - single block for easier maintenance
bio_html: |
  <p>Hello! I'm a student and researcher passionate about <span class="highlight">equitable, socially-aware language technologies</span> that prioritize <strong>language equity</strong> for low-resource languages, uphold the <strong>socio-cultural nuances</strong> of diverse linguistic communities, and ensure robust <strong>human-AI dynamics</strong>.</p>
  <p>More concretely, I'm particularly interested in how we can:</p>
  <ul class="hero-list">
    <li>better evaluate/understand social subtleties across languages and cultures, both through and within language technologies;</li>
    <li>embed socio-ethical dynamics/intelligence within the creation of language technologies.</li>
  </ul>

education_html: Previously, I earned a B.S. in Computer Science (Honors), a B.S. in Philosophy, and a certificate in leadership from the <img class="intro-logo crest" src="/Images/uw-crest-color-web-digital.svg" alt="" /> <a href="https://www.wisc.edu/" target="_blank" rel="noopener noreferrer">University of Wisconsin&ndash;Madison</a>.

